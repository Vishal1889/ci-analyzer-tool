name: Build Executables

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE
        run: |
          pyinstaller --onedir --windowed `
            --name "CI-Analyzer" `
            --icon icon.ico `
            --add-data "src;src" `
            --add-data "main.py;." `
            --collect-all requests `
            --collect-all dotenv `
            --collect-all cryptography `
            --collect-all cron_descriptor `
            --collect-all customtkinter `
            --hidden-import sqlite3 `
            --hidden-import xml.etree `
            --hidden-import xml.etree.ElementTree `
            --hidden-import xml.etree.ElementPath `
            --hidden-import xml.etree.ElementInclude `
            ui.py

      - name: Sign Windows EXE (self-signed)
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:CERTIFICATE_BASE64) {
            Write-Warning "WINDOWS_CERTIFICATE secret not set — generating ephemeral self-signed cert instead"
            $cert = New-SelfSignedCertificate `
              -Type CodeSigning `
              -Subject "CN=CI Analyzer, O=CI Analyzer Tool, C=US" `
              -KeyUsage DigitalSignature `
              -FriendlyName "CI Analyzer Code Signing" `
              -CertStoreLocation "Cert:\CurrentUser\My" `
              -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
              -NotAfter (Get-Date).AddYears(5)
          } else {
            # Decode PFX from GitHub secret and import into cert store
            $certBytes = [Convert]::FromBase64String($env:CERTIFICATE_BASE64)
            [IO.File]::WriteAllBytes("codesign.pfx", $certBytes)
            $pwd = ConvertTo-SecureString -String $env:CERTIFICATE_PASSWORD -Force -AsPlainText
            $cert = Import-PfxCertificate -FilePath "codesign.pfx" -CertStoreLocation "Cert:\CurrentUser\My" -Password $pwd
            Remove-Item codesign.pfx
          }

          # Sign the EXE with a public timestamp server
          $result = Set-AuthenticodeSignature `
            -FilePath "dist\CI-Analyzer\CI-Analyzer.exe" `
            -Certificate $cert `
            -TimestampServer "http://timestamp.digicert.com" `
            -HashAlgorithm SHA256

          Write-Host "Signing status: $($result.Status)"
          if ($result.Status -ne "Valid") {
            Write-Warning "Signing returned status: $($result.Status) - $($result.StatusMessage)"
          }

      - name: Zip Windows app for distribution
        run: |
          cd dist
          Compress-Archive -Path "CI-Analyzer" -DestinationPath "CI-Analyzer-Windows.zip"
          Write-Host "Zipped: $(Get-Item CI-Analyzer-Windows.zip | Select-Object -ExpandProperty Length) bytes"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: CI-Analyzer-Windows
          path: dist/CI-Analyzer-Windows.zip

  build-macos:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Create macOS .icns icon
        run: |
          python - <<'EOF'
          from PIL import Image
          import io, os

          # Use icon.png directly from the repository
          img = Image.open("icon.png").convert("RGBA")

          # Create iconset directory
          os.makedirs("app.iconset", exist_ok=True)
          sizes = [16, 32, 64, 128, 256, 512]
          for s in sizes:
              resized = img.resize((s, s), Image.LANCZOS)
              resized.save(f"app.iconset/icon_{s}x{s}.png")
              if s <= 256:
                  resized2 = img.resize((s * 2, s * 2), Image.LANCZOS)
                  resized2.save(f"app.iconset/icon_{s}x{s}@2x.png")

          print("iconset created successfully")
          EOF
          iconutil -c icns app.iconset -o app.icns
          echo "app.icns created"

      - name: Build macOS App (single executable)
        run: |
          pyinstaller --onefile \
            --name "CI-Analyzer" \
            --icon app.icns \
            --add-data "src:src" \
            --add-data "main.py:." \
            --collect-all requests \
            --collect-all dotenv \
            --collect-all cryptography \
            --collect-all cron_descriptor \
            --collect-all customtkinter \
            --hidden-import sqlite3 \
            --hidden-import xml.etree \
            --hidden-import xml.etree.ElementTree \
            --hidden-import xml.etree.ElementPath \
            --hidden-import xml.etree.ElementInclude \
            ui.py

      - name: Ad-hoc sign macOS executable
        run: |
          xattr -cr dist/CI-Analyzer || true
          codesign --force --sign - dist/CI-Analyzer
          codesign -v dist/CI-Analyzer && echo "Signature OK" || echo "WARNING: signature failed"

      - name: Zip macOS app for distribution
        run: |
          cd dist
          zip CI-Analyzer-macOS.zip CI-Analyzer
          echo "Zipped: $(ls -lh CI-Analyzer-macOS.zip)"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: CI-Analyzer-macOS
          path: dist/CI-Analyzer-macOS.zip

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout code (for cert file)
        uses: actions/checkout@v5

      - name: Download Windows artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: CI-Analyzer-Windows
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: CI-Analyzer-macOS
          path: artifacts/macos

      - name: Create Release
        uses: softprops/action-gh-release@v2.2.2
        with:
          name: "CI Analyzer ${{ github.ref_name }}"
          body: |
            ## CI Analyzer Tool ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `CI-Analyzer-Windows.zip` | Unzip folder, double-click `CI-Analyzer.exe` inside |
            | macOS | `CI-Analyzer-macOS.zip` | Unzip folder, double-click `CI-Analyzer` inside |
            | Windows Trust | `ci-analyzer-codesign.cer` | Public code-signing certificate |

            ### First Run
            On first launch the app will create a `.env` file in the same folder where you save your configuration.

            > **macOS note:** The app is ad-hoc signed. On first launch macOS may show a security prompt — click **Open** to proceed. If the app is blocked, run `xattr -cr CI-Analyzer` in Terminal inside the unzipped folder.

            ### Windows SmartScreen / Trust
            The Windows EXE is signed with a self-signed certificate. To trust it on your machine:
            1. Download `ci-analyzer-codesign.cer` from this release
            2. Double-click the `.cer` file → **Install Certificate**
            3. Select **Local Machine** → **Place all certificates in the following store**
            4. Browse → select **Trusted Root Certification Authorities** → Finish
            5. Repeat steps 2–4 and select **Trusted Publishers** instead
          files: |
            artifacts/windows/CI-Analyzer-Windows.zip
            artifacts/macos/CI-Analyzer-macOS.zip
            ci-analyzer-codesign.cer
          draft: false
          prerelease: false